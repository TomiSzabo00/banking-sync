# =============================================================================
# Banking-Sync Configuration (Lightweight / Stateless Mode)
# Edit this file before starting the service for the first time.
# =============================================================================

enable_banking:
  # Your application UUID — visible in the Enable Banking dashboard after creating the app
  application_id: "YOUR_APPLICATION_ID"

  # Path to the RSA private key PEM downloaded when you registered the app
  # On Proxmox, this should be "/opt/banking-sync/private.pem"
  private_key_path: "/your/path/to/private.pem"

  # Base URL for the Enable Banking API. Don't change this.
  base_url: "https://api.enablebanking.com"

  # Your bank. This example uses Raiffeisen Bank's sandbox.
  # Pick your bank from the Enable Banking documentation.
  aspsp_name: "YOUR_BANK_NAME"
  country: "YOUR_COUNTRY_CODE"

  # Some banks require extra credentials during the auth flow (e.g. userId, IBAN).
  # Uncomment and fill in if your bank needs them; otherwise leave commented out.
  # credentials:
  #   userId: "your-user-id"
  #   iban: "YOUR_IBAN"
  #   currencyCode: "YOUR_CURRENCY"

  # This must be reachable in your browser AFTER the banks's auth redirect.
  # https may not be needed
  redirect_url: "https://yourdomain.com/callback"

sync:
  # Timezone for the 4x/day auto-sync schedule (off by default).
  # Enable via POST /api/sync/enable
  timezone: "UTC"
  # Default currency used when the bank doesn't provide one
  default_currency: "EUR"
  # Default start date for backfill (POST /api/sync/backfill)
  backfill_from: "2025-01-01"

# Session token + accounts are persisted in a simple JSON file
session:
  path: "./data/session.json"

server:
  host: "0.0.0.0"
  port: 8080
  # Optional: set a secret key for the Flask session
  secret_key: "your-secret-key"

# =============================================================================
# Salary Detection Rules
# A transaction is flagged as salary if the debtor_name matches ANY entry below.
# Matching is case-insensitive and checks for substring presence.
#
# If you don't need salary detection, comment out this section.
# =============================================================================
salary_detection:
  debtor_names:
    - "your-salary-sender-name"   # replace with actual sender name as it appears in bank

# =============================================================================
# Webhooks
# Add entries here to receive HTTP POST notifications on events.
# This is the ONLY way to register webhooks (no runtime API).
#
# Supported events:
#   new_transaction   — fires for every fetched transaction (booked or pending)
#   salary_detected   — fires when a salary transaction is identified
#   sync_completed    — fires after each successful sync cycle
#   auth_required     — fires when the session has expired (90-day limit)
#
# Each transaction payload includes a `tx_hash` field for consumer-side dedup.
#
# Optional HMAC signing:
#   If "secret" is set, each request will include an
#   X-Bank-Signature header: HMAC-SHA256(secret, request_body)
# =============================================================================
# =============================================================================
# Notifications
# Human-facing alerts via Home Assistant webhook.
# Auth expiry always notifies. Sync notifications are gated by notify_sync.
#
# To get the webhook URL in HA:
#   Settings → Automations → New Automation → Trigger: Webhook → copy URL
# =============================================================================
notifications:
  homeassistant:
    webhook_url: "http://homeassistant.local:8123/api/webhook/your-webhook-id"
    # Set to true to receive a notification after every sync cycle
    notify_sync: false

webhooks:
  endpoints:
    - url: "https://yourdomain.com/webhook/salary"
      events:
        - salary_detected
